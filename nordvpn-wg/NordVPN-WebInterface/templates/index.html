<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Control Panel</title>
    <base href="/vpn" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #ffffff;
        }
        .refresh-btn {
            background: none;
            border: 0;
            padding: 0 .25rem;
            font-size: 1.1rem;
            line-height: 1;
            color: inherit;
            opacity: .7;
            cursor: pointer;
        }
        .refresh-btn:hover { opacity: 1; }
        .refresh-btn.spinning { animation: spin .8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center">

    <!-- Toast notification -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x mb-4">
        <div class="toast text-white border-0" id="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-body text-center fw-semibold" id="toastBody"></div>
        </div>
    </div>

    <!-- Main card -->
    <div class="card shadow-lg" style="width: min(440px, 92vw);">
        <div class="card-body p-4">

            <h1 class="card-title text-center fw-light mb-4">VPN Control Panel</h1>

            <!-- Status badge -->
            <div class="alert alert-danger d-flex justify-content-center align-items-center fw-semibold mb-3 position-relative" id="statusBox" role="status">
                <span id="statusText">Status: Disconnected</span>
                <button type="button" class="refresh-btn position-absolute end-0 me-2" id="refreshBtn" title="Refresh" aria-label="Refresh">↻</button>
            </div>

            <!-- Structured status fields -->
            <table class="table table-sm mb-3 d-none" id="statusTable">
                <tbody></tbody>
            </table>

            <!-- Server selector + connect -->
            <form class="mb-2" onsubmit="handleSubmit(event, 'connect');">
                <select class="form-select mb-2" id="serverSelect" name="server">
                    <!-- populated dynamically -->
                </select>
                <button class="btn btn-success w-100" type="submit">Connect to VPN</button>
            </form>

            <!-- Disconnect -->
            <form onsubmit="handleSubmit(event, 'disconnect');">
                <button class="btn btn-danger w-100" type="submit">Disconnect from VPN</button>
            </form>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Build the API base URL relative to wherever the app is mounted, so this
    // works both directly and behind a reverse proxy (e.g. /vpn/).
    const API_BASE = window.location.pathname.replace(/\/?$/, '') + '/api/v1/';

    function handleSubmit(event, action) {
        event.preventDefault();

        let options;
        if (action === 'connect') {
            const server = document.getElementById('serverSelect').value;
            options = {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({server}),
            };
        } else {
            options = {method: 'POST'};
        }

        fetch(API_BASE + action, options)
            .then(response => response.json().then(data => ({ok: response.ok, data})))
            .then(({ok, data}) => {
                if (ok) {
                    showToast(data.message || 'Success');
                    updateStatus();
                } else {
                    showToast('Error: ' + (data.error || 'Unknown error'), true);
                }
            })
            .catch(error => showToast('Error: ' + error.message, true));
    }

    function showToast(message, isError = false) {
        const toastEl = document.getElementById('toast');
        document.getElementById('toastBody').textContent = message;
        toastEl.classList.toggle('bg-danger', isError);
        toastEl.classList.toggle('bg-dark',   !isError);
        bootstrap.Toast.getOrCreateInstance(toastEl, {delay: 5000}).show();
    }

    // Fields to surface in the status table, in display order. Each entry
    // is [api field name, label]. Anything not in the response is skipped.
    const STATUS_FIELDS = [
        ['Country',          'Country'],
        ['City',             'City'],
        ['Hostname',         'Hostname'],
        ['Endpoint',         'Endpoint'],
        ['Load',             'Load'],
        ['Technology',       'Technology'],
        ['Uptime',           'Uptime'],
        ['Latest handshake', 'Last handshake'],
        ['Received',         'Received'],
        ['Sent',             'Sent'],
        ['Public IPv4',      'Public IPv4'],
        ['Public IPv6',      'Public IPv6'],
    ];

    function updateStatus(force = false) {
        const refreshBtn  = document.getElementById('refreshBtn');
        const statusBox   = document.getElementById('statusBox');
        const statusText  = document.getElementById('statusText');
        const statusTable = document.getElementById('statusTable');
        const tbody       = statusTable.querySelector('tbody');

        if (refreshBtn) refreshBtn.classList.add('spinning');

        const url = API_BASE + 'status' + (force ? '?refresh=1' : '');
        return fetch(url)
            .then(response => response.json())
            .then(data => {
                tbody.innerHTML = '';

                const baseClasses = 'd-flex justify-content-center align-items-center fw-semibold mb-3 position-relative';
                if (data.status === 'Connected') {
                    statusBox.className = 'alert alert-success ' + baseClasses;
                } else {
                    statusBox.className = 'alert alert-danger ' + baseClasses;
                }

                const fields = data.fields || {};
                STATUS_FIELDS.forEach(([key, label]) => {
                    const value = fields[key];
                    if (value === undefined || value === null || value === '') return;
                    const row = document.createElement('tr');
                    const th  = document.createElement('th');
                    const td  = document.createElement('td');
                    th.scope = 'row';
                    th.className = 'text-muted fw-normal';
                    th.style.width = '40%';
                    th.textContent = label;
                    td.className = 'font-monospace small';
                    td.textContent = value;
                    row.appendChild(th);
                    row.appendChild(td);
                    tbody.appendChild(row);
                });
                statusTable.classList.toggle('d-none', tbody.children.length === 0);

                statusText.textContent = `Status: ${data.status}`;
            })
            .finally(() => {
                if (refreshBtn) refreshBtn.classList.remove('spinning');
            });
    }

    function setServerSelectPlaceholder(text) {
        const serverSelect = document.getElementById('serverSelect');
        serverSelect.innerHTML = '';
        const option = document.createElement('option');
        option.disabled = true;
        option.selected = true;
        option.text = text;
        serverSelect.add(option);
    }

    function loadServers(retryDelay = 2000) {
        fetch(API_BASE + 'servers')
            .then(response => {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(servers => {
                if (!Array.isArray(servers)) {
                    throw new Error('unexpected response: ' + JSON.stringify(servers));
                }
                const serverSelect = document.getElementById('serverSelect');
                serverSelect.innerHTML = '';
                servers.forEach(server => {
                    const option = document.createElement('option');
                    option.value = server.code;
                    option.text  = server.name;
                    serverSelect.add(option);
                });

                // Pre-select the currently connected city, if any
                fetch(API_BASE + 'status')
                    .then(response => response.json())
                    .then(data => {
                        if (data.city_code) {
                            serverSelect.value = data.city_code;
                        }
                    });
            })
            .catch(err => {
                console.warn('loadServers failed, retrying:', err);
                setServerSelectPlaceholder('Loading server list…');
                const next = Math.min(retryDelay * 2, 60000);
                setTimeout(() => loadServers(next), retryDelay);
            });
    }

    document.addEventListener('DOMContentLoaded', () => {
        setServerSelectPlaceholder('Loading server list…');
        document.getElementById('refreshBtn').addEventListener('click', () => updateStatus(true));
        updateStatus();
        loadServers();
        setInterval(updateStatus, 10000);
    });
</script>
</body>
</html>
