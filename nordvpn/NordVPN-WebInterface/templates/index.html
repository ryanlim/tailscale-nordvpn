<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Control Panel</title>
    <base href="/vpn" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #ffffff;
        }
    </style>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center">

    <!-- Toast notification -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x mb-4">
        <div class="toast text-white border-0" id="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-body text-center fw-semibold" id="toastBody"></div>
        </div>
    </div>

    <!-- Main card -->
    <div class="card shadow-lg" style="width: min(440px, 92vw);">
        <div class="card-body p-4">

            <h1 class="card-title text-center fw-light mb-4">VPN Control Panel</h1>

            <!-- Status badge -->
            <div class="alert alert-danger text-center fw-semibold mb-3" id="statusBox" role="status">
                Status: Disconnected
            </div>

            <!-- Connected server label -->
            <p class="text-center mb-2" id="connectedServer"></p>

            <!-- Raw nordvpn status output -->
            <pre class="bg-light rounded p-2 small font-monospace text-start d-none mb-3" id="details"></pre>

            <!-- Server selector + connect -->
            <form class="mb-2" onsubmit="handleSubmit(event, 'connect');">
                <select class="form-select mb-2" id="serverSelect" name="server">
                    <!-- populated dynamically -->
                </select>
                <button class="btn btn-success w-100" type="submit">Connect to VPN</button>
            </form>

            <!-- Disconnect -->
            <form onsubmit="handleSubmit(event, 'disconnect');">
                <button class="btn btn-danger w-100" type="submit">Disconnect from VPN</button>
            </form>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Build the API base URL relative to wherever the app is mounted, so this
    // works both directly and behind a reverse proxy (e.g. /vpn/).
    const API_BASE = window.location.pathname.replace(/\/?$/, '') + '/api/v1/';

    function handleSubmit(event, action) {
        event.preventDefault();

        let options;
        if (action === 'connect') {
            const server = document.getElementById('serverSelect').value;
            options = {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({server}),
            };
        } else {
            options = {method: 'POST'};
        }

        fetch(API_BASE + action, options)
            .then(response => response.json().then(data => ({ok: response.ok, data})))
            .then(({ok, data}) => {
                if (ok) {
                    showToast(data.message || 'Success');
                    updateStatus();
                } else {
                    showToast('Error: ' + (data.error || 'Unknown error'), true);
                }
            })
            .catch(error => showToast('Error: ' + error.message, true));
    }

    function showToast(message, isError = false) {
        const toastEl = document.getElementById('toast');
        document.getElementById('toastBody').textContent = message;
        toastEl.classList.toggle('bg-danger', isError);
        toastEl.classList.toggle('bg-dark',   !isError);
        bootstrap.Toast.getOrCreateInstance(toastEl, {delay: 5000}).show();
    }

    function updateStatus() {
        fetch(API_BASE + 'status')
            .then(response => response.json())
            .then(data => {
                const statusBox      = document.getElementById('statusBox');
                const connectedServer = document.getElementById('connectedServer');
                const details        = document.getElementById('details');

                if (data.status === 'Connected') {
                    statusBox.className = 'alert alert-success text-center fw-semibold mb-3';
                    connectedServer.textContent = `Connected to: ${data.city} (${data.server})`;
                    details.textContent = data.details;
                    details.classList.remove('d-none');
                } else {
                    statusBox.className = 'alert alert-danger text-center fw-semibold mb-3';
                    connectedServer.textContent = '';
                    details.textContent = '';
                    details.classList.add('d-none');
                }
                statusBox.textContent = `Status: ${data.status}`;
            });
    }

    function loadServers() {
        fetch(API_BASE + 'servers')
            .then(response => response.json())
            .then(servers => {
                const serverSelect = document.getElementById('serverSelect');
                serverSelect.innerHTML = '';
                servers.forEach(server => {
                    const option = document.createElement('option');
                    option.value = server.code;
                    option.text  = server.name;
                    serverSelect.add(option);
                });

                // Pre-select the currently connected city, if any
                fetch(API_BASE + 'status')
                    .then(response => response.json())
                    .then(data => {
                        if (data.city_code) {
                            serverSelect.value = data.city_code;
                        }
                    });
            });
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateStatus();
        loadServers();
        setInterval(updateStatus, 10000);
    });
</script>
</body>
</html>
