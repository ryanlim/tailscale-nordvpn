  # WireGuard-based replacement for the nordvpn service above.
  # Prerequisites:
  #   1. Fetch your NordLynx private key (uses NORDVPN_TOKEN from .env):
  #        ./nordvpn-wg/scripts/extract_key.sh > ./nordvpn-wg/wireguard/private.key
  #   2. Comment out the `nordvpn` service above (it shares container_name + IP),
  #      then uncomment this block and `docker compose up -d --build nordvpn-wg`.
  # Runtime usage (mirrors the NordVPN CLI):
  #   docker exec -it ts-${INSTANCE_NAME} nordvpn status
  #   docker exec -it ts-${INSTANCE_NAME} nordvpn connect Tokyo
  #   docker exec -it ts-${INSTANCE_NAME} nordvpn countries
  #
  nordvpn-wg:
    build:
      context: nordvpn-wg
    container_name: ts-nordvpn-${INSTANCE_NAME}
    hostname: ts-nordvpn
    restart: always
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - NORDVPN_TOKEN=${NORDVPN_TOKEN}
      - NORDVPN_TARGET=${NORDVPN_ENDPOINT:-}
      - IP_SUBNET=${IP_SUBNET}
      - INSTANCE_NAME=${INSTANCE_NAME}
      - RECONNECT_AFTER_HOURS=${NORDVPN_RECONNECT_AFTER_HOURS}
    volumes:
      - "/dev/net/tun:/dev/net/tun"
      - "./nordvpn-wg/wireguard:/etc/wireguard"
    cap_add:
      - net_admin
      - sys_module
    networks:
      ts-net:
        ipv4_address: ${IP_NORDVPN}

  control-panel:
    build:
      context: control-panel
    container_name: ts-control-panel-${INSTANCE_NAME}
    hostname: ts-control-panel
    restart: always
    volumes:
      - "./control-panel/config:/config:ro"
    networks:
      ts-net:
        ipv4_address: ${IP_PANEL}

networks:
  ts-net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: ${IP_SUBNET}

