name: ts-${INSTANCE_NAME}

services:
  tailscale:
    build:
      context: tailscale
    container_name: ts-tailscale-${INSTANCE_NAME}
    hostname: ts-tailscale
    command: [
      '/scripts/tailscale_up.sh'
    ]
    user: root
    restart: always
    volumes:
      - "/dev/net/tun:/dev/net/tun"
      - "./tailscale/state:/var/lib/tailscale"
      - "./tailscale/scripts:/scripts"
    environment:
      - TAILSCALE_UP_LOGIN_SERVER=${TAILSCALE_UP_LOGIN_SERVER}
      - TAILSCALE_AUTH_KEY=${TAILSCALE_AUTH_KEY:-}
      - IP_NORDVPN=${IP_NORDVPN}
      - IP_PANEL=${IP_PANEL}
      - INSTANCE_NAME=${INSTANCE_NAME}
    cap_add:
      - net_admin
      - sys_module
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD-SHELL", "tailscale status --peers=false >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      ts-net:
        ipv4_address: ${IP_TAILSCALE}

